name: Report dead link
description: Report a broken or redirected resource URL.
title: "[Dead Link]: "
labels:
  - type:bug
  - area:links
  - priority:high
  - status:triage
body:
  - type: input
    id: section
    attributes:
      label: Section
      description: Category where the broken link appears.
    validations:
      required: true

  - type: input
    id: resource-name
    attributes:
      label: Resource name
    validations:
      required: true

  - type: input
    id: broken-url
    attributes:
      label: Broken URL
      placeholder: https://example.com
    validations:
      required: true

  - type: input
    id: replacement-url
    attributes:
      label: Suggested replacement URL
      placeholder: https://example.com
